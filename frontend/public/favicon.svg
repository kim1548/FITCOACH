<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- FitCoach favicon — 옥스블러드 라운드 사각 + 크림 italic 'F'.
       목업 핏코치 마크.png 와 동일 디자인. -->
  <rect width="64" height="64" rx="10" fill="#c43c2f"/>
  <text x="50%" y="50%"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Georgia, 'Playfair Display', 'Times New Roman', serif"
        font-style="italic"
        font-size="46"
        font-weight="700"
        fill="#f0e8d8">F</text>
</svg>
